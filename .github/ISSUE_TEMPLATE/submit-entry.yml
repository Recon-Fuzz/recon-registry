name: Submit a registry entry
description: Submit a packed entry — a bot opens the PR for you (no git/gh needed).
title: "[entry] "
labels: ["submit-entry"]
body:
  - type: markdown
    attributes:
      value: |
        Paste the JSON from `npx recon-registry pack` (recon-registry-out/<name>.json) — OR, if it is
        large, drag-drop that .json file here. On submit, a bot validates it and opens a PR.
  - type: textarea
    id: entry_json
    attributes:
      label: Entry JSON
      description: Paste the entry JSON, or drag-drop the recon-registry-out/<name>.json file
      render: json
    validations:
      required: true
