name: Submit a registry entry
description: Paste a packed entry JSON — a bot validates it and opens a PR.
title: "[entry] "
labels: ["submit-entry"]
body:
  - type: markdown
    attributes:
      value: |
        Run `npx recon-registry pack`, then `npx recon-registry publish` — it copies the entry
        JSON to your clipboard and opens this page. Paste it below (Ctrl/Cmd+V) and submit.
  - type: textarea
    id: entry_json
    attributes:
      label: Entry JSON
      description: Paste the contents of recon-registry-out/<name>.json
      render: json
    validations:
      required: true
